<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Курсы / Конвертер</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', 'Helvetica Neue', sans-serif;
    background: #0d0d0d;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px;
  }

  /* TABS */
  .tabs {
    display: flex;
    gap: 0;
    background: #1a1a1a;
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 20px;
    width: 100%;
    max-width: 340px;
  }
  .tab {
    flex: 1;
    text-align: center;
    padding: 10px 0;
    font-size: 14px;
    font-weight: 500;
    color: #666;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .tab.active {
    background: #2a2a2a;
    color: #fff;
  }

  .panel { display: none; width: 100%; max-width: 340px; }
  .panel.active { display: block; }

  /* CARDS */
  .card {
    background: #1a1a1a;
    border-radius: 20px;
    padding: 24px;
    width: 100%;
    margin-bottom: 10px;
  }
  .card .label {
    font-size: 12px;
    color: #888;
    letter-spacing: 0.5px;
    margin-bottom: 2px;
  }
  .card .value {
    font-size: 34px;
    font-weight: 600;
    letter-spacing: -0.5px;
    transition: color 0.3s;
  }
  .card .value.up { color: #34c759; }
  .card .value.down { color: #ff3b30; }
  .card .sub {
    font-size: 12px;
    color: #666;
    margin-top: 4px;
  }
  .last-update {
    font-size: 11px;
    color: #444;
    text-align: center;
    margin: 8px 0 16px;
  }

  /* CONVERTER */
  .conv-card {
    background: #1a1a1a;
    border-radius: 20px;
    padding: 24px;
    width: 100%;
    margin-bottom: 10px;
  }
  .conv-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .conv-row:last-child { margin-bottom: 0; }
  .conv-input {
    flex: 1;
    background: #2a2a2a;
    border: none;
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 20px;
    font-weight: 500;
    color: #fff;
    outline: none;
    min-width: 0;
    -webkit-appearance: none;
    appearance: none;
  }
  .conv-input::placeholder { color: #555; }
  .conv-input:focus { background: #333; }
  .conv-currency {
    font-size: 14px;
    font-weight: 600;
    color: #888;
    min-width: 48px;
    text-align: right;
  }
  .conv-equals {
    font-size: 18px;
    color: #555;
    text-align: center;
    padding: 4px 0;
  }
  .conv-rate-hint {
    font-size: 12px;
    color: #555;
    text-align: center;
    margin-top: 12px;
  }

  .calc-btn {
    background: #2a6eff;
    border: none;
    border-radius: 14px;
    padding: 14px;
    font-size: 16px;
    font-weight: 600;
    color: #fff;
    width: 100%;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    margin-top: 4px;
  }
  .calc-btn:active { background: #1a5eef; }
</style>
</head>
<body>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" data-tab="rates">Курсы</div>
  <div class="tab" data-tab="convert">Конвертер</div>
</div>

<!-- PANEL: КУРСЫ -->
<div class="panel active" id="panel-rates">
  <div class="card">
    <div class="label">🇺🇸 Доллар → Рубль</div>
    <div class="value" id="usd-rate">—</div>
    <div class="sub">ЦБ РФ</div>
  </div>
  <div class="card">
    <div class="label">₿ Биткоин → Доллар</div>
    <div class="value" id="btc-rate">—</div>
    <div class="sub" id="btc-rub">₽ —</div>
  </div>
  <div class="last-update" id="last-update">⏳ загрузка...</div>
</div>

<!-- PANEL: КОНВЕРТЕР -->
<div class="panel" id="panel-convert">
  <div class="conv-card">
    <div class="conv-row">
      <input class="conv-input" id="in-rub" type="text" inputmode="decimal" autocomplete="off" spellcheck="false" placeholder="₽">
      <span class="conv-currency">₽</span>
    </div>
    <div class="conv-equals">▼</div>
    <div class="conv-row">
      <input class="conv-input" id="in-usd" type="text" inputmode="decimal" autocomplete="off" spellcheck="false" placeholder="$">
      <span class="conv-currency">$</span>
    </div>
    <div class="conv-equals">▼</div>
    <div class="conv-row">
      <input class="conv-input" id="in-btc" type="text" inputmode="decimal" autocomplete="off" spellcheck="false" placeholder="BTC">
      <span class="conv-currency">BTC</span>
    </div>
    <div class="conv-rate-hint" id="conv-hint">⏳ загрузка курсов...</div>
    <button class="calc-btn" id="calc-btn">Рассчитать</button>
  </div>
</div>

<script>
const state = { usdRub: null, btcUsd: null };
const CACHE_TTL = 300000;

function getCache(k) {
  try { const r = localStorage.getItem(k); if (!r) return null; const {d,t}=JSON.parse(r); if (Date.now()-t>CACHE_TTL) return null; return d; } catch { return null; }
}
function setCache(k, d) {
  try { localStorage.setItem(k, JSON.stringify({d,t:Date.now()})); } catch {}
}
function clr(s) {
  if (!s) return 0;
  let c = String(s).replace(/[^\d,.\-]/g, '');
  if (c.includes(',') && c.includes('.')) {
    if (c.lastIndexOf(',') > c.lastIndexOf('.')) c = c.replace(/\./g, '').replace(',','.');
    else c = c.replace(/,/g, '');
  } else if (c.includes(',')) c = c.replace(',','.');
  return parseFloat(c) || 0;
}
function fmt(n, d) { return Number(n).toLocaleString('ru-RU',{minimumFractionDigits:d,maximumFractionDigits:d}); }
function fmt$(n) { return '$' + Number(n).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0}); }

async function fetchUSDRUB() {
  let c = getCache('u'); if (c) return c;
  try {
    const r = await fetch('https://www.cbr-xml-daily.ru/daily_json.js');
    const v = (await r.json()).Valute.USD.Value;
    setCache('u', v); return v;
  } catch {
    try { const r=await fetch('https://api.exchangerate.host/latest?base=USD&symbols=RUB'); return (await r.json()).rates.RUB; } catch { return null; }
  }
}
async function fetchBTCUSD() {
  let c = getCache('b'); if (c) return c;
  try {
    const r=await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd');
    const v=(await r.json()).bitcoin.usd;
    setCache('b', v); return v;
  } catch { return null; }
}

async function refreshRates() {
  const [u, b] = await Promise.all([fetchUSDRUB(), fetchBTCUSD()]);
  state.usdRub = u; state.btcUsd = b;
  // render rates
  const now = new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('usd-rate').textContent = u ? fmt(u,2) + ' ₽' : '—';
  document.getElementById('btc-rate').textContent = b ? fmt$(b) : '—';
  document.getElementById('btc-rub').textContent = (u && b) ? '₽ ' + fmt(b*u, 0) : '—';
  document.getElementById('last-update').textContent = '🔄 ' + now;
  const h = document.getElementById('conv-hint');
  if (u) {
    h.textContent = '1 $ = ' + fmt(u,2) + ' ₽' + (b ? '  ·  1 BTC = ' + fmt$(b) : '');
  }
}

function convert() {
  const rubV = clr(document.getElementById('in-rub').value);
  const usdV = clr(document.getElementById('in-usd').value);
  const btcV = clr(document.getElementById('in-btc').value);

  if (rubV && !usdV && !btcV) {
    if (state.usdRub) {
      const u = rubV / state.usdRub;
      document.getElementById('in-usd').value = fmt(u,2);
      if (state.btcUsd) document.getElementById('in-btc').value = fmt(u / state.btcUsd, 8);
    }
  } else if (usdV && !rubV && !btcV) {
    if (state.usdRub) document.getElementById('in-rub').value = fmt(usdV * state.usdRub, 2);
    if (state.btcUsd) document.getElementById('in-btc').value = fmt(usdV / state.btcUsd, 8);
  } else if (btcV && !rubV && !usdV) {
    if (state.btcUsd) {
      const u = btcV * state.btcUsd;
      document.getElementById('in-usd').value = fmt(u,2);
      if (state.usdRub) document.getElementById('in-rub').value = fmt(u * state.usdRub, 2);
    }
  }
}

// Init
(async () => {
  await refreshRates();
  // auto-refresh every 60s
  setInterval(refreshRates, 60000);
})();

// Convert button
document.getElementById('calc-btn').addEventListener('click', convert);

// Enter key triggers convert
['in-rub','in-usd','in-btc'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => {
    if (e.key === 'Enter') convert();
  });
});
</script>
</body>
</html>
