<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Курсы / Конвертер</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', 'Helvetica Neue', sans-serif;
    background: #0d0d0d;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px;
  }

  .tabs {
    display: flex;
    gap: 0;
    background: #1a1a1a;
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 20px;
    width: 100%;
    max-width: 400px;
  }
  .tab {
    flex: 1;
    text-align: center;
    padding: 10px 0;
    font-size: 14px;
    font-weight: 500;
    color: #666;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .tab.active { background: #2a2a2a; color: #fff; }

  .panel { display: none; width: 100%; max-width: 400px; }
  .panel.active { display: block; }

  .card {
    background: #1a1a1a;
    border-radius: 20px;
    padding: 24px;
    width: 100%;
    margin-bottom: 10px;
  }
  .card .label {
    font-size: 12px;
    color: #888;
    letter-spacing: 0.5px;
    margin-bottom: 2px;
  }
  .card .value {
    font-size: 34px;
    font-weight: 600;
    letter-spacing: -0.5px;
  }
  .card .sub { font-size: 12px; color: #666; margin-top: 4px; }
  .sub-flex { display: flex; gap: 12px; font-size: 12px; color: #666; margin-top: 4px; }

  /* Refresh bar */
  .refresh-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #1a1a1a;
    border-radius: 14px;
    padding: 10px 16px;
    width: 100%;
    max-width: 400px;
    margin-bottom: 10px;
  }
  .refresh-time {
    font-size: 12px;
    color: #555;
  }
  .refresh-btn {
    background: #2a6eff;
    border: none;
    border-radius: 10px;
    padding: 8px 20px;
    font-size: 14px;
    font-weight: 600;
    color: #fff;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .refresh-btn:active { background: #1a5eef; }
  .refresh-btn.loading { background: #555; }

  .last-update {
    font-size: 11px;
    color: #444;
    text-align: center;
    margin: 8px 0 16px;
  }

  .conv-card {
    background: #1a1a1a;
    border-radius: 20px;
    padding: 24px;
    width: 100%;
    margin-bottom: 10px;
  }
  .conv-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .conv-row:last-child { margin-bottom: 0; }
  .conv-input {
    flex: 1;
    background: #2a2a2a;
    border: none;
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 20px;
    font-weight: 500;
    color: #fff;
    outline: none;
    min-width: 0;
    -webkit-appearance: none;
    appearance: none;
  }
  .conv-input::placeholder { color: #555; }
  .conv-input:focus { background: #333; }
  .conv-currency {
    font-size: 14px;
    font-weight: 600;
    color: #888;
    min-width: 44px;
    text-align: right;
  }
  .conv-equals {
    font-size: 14px;
    color: #555;
    text-align: center;
    padding: 2px 0;
  }
  .conv-rate-hint {
    font-size: 11px;
    color: #555;
    text-align: center;
    margin-top: 10px;
    line-height: 1.5;
  }
  .calc-btn {
    background: #2a6eff;
    border: none;
    border-radius: 14px;
    padding: 14px;
    font-size: 16px;
    font-weight: 600;
    color: #fff;
    width: 100%;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    margin-top: 4px;
  }
  .calc-btn:active { background: #1a5eef; }
</style>
</head>
<body>

<div class="tabs">
  <div class="tab active" data-tab="rates">Курсы</div>
  <div class="tab" data-tab="convert">Конвертер</div>
</div>

<!-- PANEL: КУРСЫ -->
<div class="panel active" id="panel-rates">
  <div class="card">
    <div class="label">🇺🇸 Доллар → Рубль</div>
    <div class="value" id="usd-rate">—</div>
    <div class="sub">📊 ЦБ РФ</div>
  </div>
  <div class="card">
    <div class="label">🇹🇭 Тайский бат → Рубль</div>
    <div class="value" id="thb-rate">—</div>
    <div class="sub" id="thb-usd">📊 ЦБ РФ</div>
  </div>
  <div class="card">
    <div class="label">₿ Биткоин → Доллар</div>
    <div class="value" id="btc-rate">—</div>
    <div class="sub" id="btc-rub">📊 CoinGecko</div>
  </div>
  <div class="refresh-bar">
    <span class="refresh-time" id="update-time">⏳ загрузка...</span>
    <button class="refresh-btn" id="refresh-btn">🔄 Обновить</button>
  </div>
</div>

<!-- PANEL: КОНВЕРТЕР -->
<div class="panel" id="panel-convert">
  <div class="conv-card">
    <div class="conv-row">
      <input class="conv-input" id="in-rub" type="text" inputmode="decimal" autocomplete="off" spellcheck="false" placeholder="рубли">
      <span class="conv-currency">₽</span>
    </div>
    <div class="conv-equals">▼</div>
    <div class="conv-row">
      <input class="conv-input" id="in-usd" type="text" inputmode="decimal" autocomplete="off" spellcheck="false" placeholder="доллары">
      <span class="conv-currency">$</span>
    </div>
    <div class="conv-equals">▼</div>
    <div class="conv-row">
      <input class="conv-input" id="in-thb" type="text" inputmode="decimal" autocomplete="off" spellcheck="false" placeholder="тайские баты">
      <span class="conv-currency">THB</span>
    </div>
    <div class="conv-equals">▼</div>
    <div class="conv-row">
      <input class="conv-input" id="in-btc" type="text" inputmode="decimal" autocomplete="off" spellcheck="false" placeholder="биткоины">
      <span class="conv-currency">BTC</span>
    </div>
    <div class="conv-rate-hint" id="conv-hint"></div>
    <button class="calc-btn" id="calc-btn">Рассчитать</button>
  </div>
</div>

<script>
const state = { usdRub: null, thbRub: null, btcUsd: null };
const CACHE_TTL = 300000;

function getCache(k) {
  try { const r = localStorage.getItem(k); if (!r) return null; const {d,t}=JSON.parse(r); if (Date.now()-t>CACHE_TTL) return null; return d; } catch { return null; }
}
function setCache(k, d) {
  try { localStorage.setItem(k, JSON.stringify({d,t:Date.now()})); } catch {}
}
function clr(s) {
  if (!s) return 0;
  let c = String(s).replace(/[^\d,.\-]/g, '');
  if (c.includes(',') && c.includes('.')) {
    if (c.lastIndexOf(',') > c.lastIndexOf('.')) c = c.replace(/\./g, '').replace(',','.');
    else c = c.replace(/,/g, '');
  } else if (c.includes(',')) c = c.replace(',','.');
  return parseFloat(c) || 0;
}
function fmt(n, d) { return Number(n).toLocaleString('ru-RU',{minimumFractionDigits:d,maximumFractionDigits:d}); }
function fmt$(n) { return '$' + Number(n).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0}); }

async function fetchRates() {
  const cUsd = getCache('u'), cThb = getCache('t'), cBtc = getCache('b');
  if (cUsd) state.usdRub = cUsd;
  if (cThb) state.thbRub = cThb;
  if (cBtc) state.btcUsd = cBtc;

  try {
    const r = await fetch('https://www.cbr-xml-daily.ru/daily_json.js');
    const d = await r.json();
    state.usdRub = d.Valute.USD.Value / (d.Valute.USD.Nominal || 1);
    state.thbRub = d.Valute.THB.Value / (d.Valute.THB.Nominal || 1);
    setCache('u', state.usdRub);
    setCache('t', state.thbRub);
  } catch {}

  try {
    const r = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd');
    const d = await r.json();
    state.btcUsd = d.bitcoin.usd;
    setCache('b', state.btcUsd);
  } catch {}

  renderRates();
}

function renderRates() {
  const now = new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
  const u = state.usdRub, t = state.thbRub, b = state.btcUsd;

  document.getElementById('usd-rate').textContent = u ? fmt(u,2) + ' ₽' : '—';
  document.getElementById('thb-rate').textContent = t ? fmt(t,2) + ' ₽' : '—';
  document.getElementById('thb-usd').textContent = '📊 ЦБ РФ · 1 THB ≈ ' + (u && t ? fmt(t/u,4) : '—') + ' $';
  document.getElementById('btc-rate').textContent = b ? fmt$(b) : '—';
  document.getElementById('btc-rub').textContent = '📊 CoinGecko · ' + ((u && b) ? '₽ ' + fmt(b*u, 0) : '—');

  document.getElementById('update-time').textContent = '🔄 ' + now;

  const hint = document.getElementById('conv-hint');
  const parts = [];
  if (u) parts.push('📊 ЦБ РФ: 1 $ = ' + fmt(u,2) + ' ₽');
  if (t) parts.push('1 THB = ' + fmt(t,2) + ' ₽');
  if (b) parts.push('📊 CoinGecko: 1 BTC = ' + fmt$(b));
  hint.textContent = parts.join('\n');
}

async function refreshAll() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('loading');
  btn.textContent = '⏳';
  await fetchRates();
  btn.classList.remove('loading');
  btn.textContent = '🔄 Обновить';
}

function convert() {
  const r = clr(document.getElementById('in-rub').value);
  const d = clr(document.getElementById('in-usd').value);
  const t = clr(document.getElementById('in-thb').value);
  const b = clr(document.getElementById('in-btc').value);

  const filled = [r ? 'rub':0, d ? 'usd':0, t ? 'thb':0, b ? 'btc':0].filter(Boolean);
  if (filled.length !== 1) return;

  const src = filled[0];
  let val = 0;
  if (src === 'rub') val = r;
  else if (src === 'usd') val = d;
  else if (src === 'thb') val = t;
  else if (src === 'btc') val = b;

  let inRub = 0;
  if (src === 'rub') inRub = val;
  else if (src === 'usd' && state.usdRub) inRub = val * state.usdRub;
  else if (src === 'thb' && state.thbRub) inRub = val * state.thbRub;
  else if (src === 'btc' && state.btcUsd && state.usdRub) inRub = val * state.btcUsd * state.usdRub;

  if (!inRub) return;

  const fields = {
    rub: document.getElementById('in-rub'),
    usd: document.getElementById('in-usd'),
    thb: document.getElementById('in-thb'),
    btc: document.getElementById('in-btc')
  };

  if (src !== 'rub' && state.usdRub) fields.rub.value = fmt(inRub, 2);
  if (src !== 'usd' && state.usdRub) fields.usd.value = fmt(inRub / state.usdRub, 2);
  if (src !== 'thb' && state.thbRub) fields.thb.value = fmt(inRub / state.thbRub, 2);
  if (src !== 'btc' && state.btcUsd && state.usdRub) fields.btc.value = fmt(inRub / (state.btcUsd * state.usdRub), 8);
}

// Auto-convert with debounce
function prepareAndConvert(srcId) {
  const ids = ['in-rub','in-usd','in-thb','in-btc'];
  const others = ids.filter(id => id !== srcId);
  const val = document.getElementById(srcId).value.trim();
  if (!val || clr(val) === 0) return;
  others.forEach(id => document.getElementById(id).value = '');
  convert();
}

const debounceTimers = {};
['in-rub','in-usd','in-thb','in-btc'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => {
    clearTimeout(debounceTimers[id]);
    debounceTimers[id] = setTimeout(() => prepareAndConvert(id), 300);
  });
  document.getElementById(id).addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === 'Return') {
      clearTimeout(debounceTimers[id]);
      prepareAndConvert(id);
    }
  });
});

// Tabs
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('panel-' + t.dataset.tab).classList.add('active');
  });
});

// Events
document.getElementById('calc-btn').addEventListener('click', convert);
document.getElementById('refresh-btn').addEventListener('click', refreshAll);

// Init
fetchRates();
setInterval(fetchRates, 60000);
</script>
</body>
</html>
